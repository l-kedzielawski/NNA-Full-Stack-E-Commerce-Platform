# ─── HTTP → HTTPS redirect + ACME challenge ───────────────────────────────────
server {
    listen 80;
    server_name themysticaroma.com www.themysticaroma.com api.themysticaroma.com admin.themysticaroma.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main website (Next.js) ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name themysticaroma.com www.themysticaroma.com;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/themysticaroma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/themysticaroma.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # www → non-www canonical redirect
    if ($host = www.themysticaroma.com) {
        return 301 https://themysticaroma.com$request_uri;
    }

    # Static assets – long cache, served directly from Next.js _next/static
    location /_next/static/ {
        proxy_pass http://nextjs:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public static files
    location /public/ {
        proxy_pass http://nextjs:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://nextjs:3000;
    }
}

# ─── Medusa API ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.themysticaroma.com;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/themysticaroma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/themysticaroma.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Medusa uploads / static
    location /static/ {
        proxy_pass http://medusa:9000;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass         http://medusa:9000;
        proxy_read_timeout 120s;         # Medusa migrations can be slow on first boot
        client_max_body_size 50m;        # file uploads
    }
}

# ─── Strapi CMS admin ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name admin.themysticaroma.com;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/themysticaroma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/themysticaroma.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://strapi:1337;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }
}
